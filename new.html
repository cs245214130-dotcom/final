<!DOCTYPE html>
<html>
<head>

<title>To Do List</title>

<style>
body{
margin-top:50px;
}
</style>

</head>

<body>
<center>
<div class="container">

<h2>To Do List</h2>

<input type="text" id="task" placeholder="Enter task">

<button onclick="addTask()">Add</button>

<ul id="list"></ul>

<button onclick="deleteTask()" id="del">Delete</button>
 

</div>
</center>
<script>

function addTask(){

let task=document.getElementById("task").value;

let li=document.createElement("li");
li.innerText=task;

document.getElementById("list").appendChild(li);

}

function deleteTask(){
let del=document.getElementById("del").value;
document.getElementById("list").delete(li);
}
</script>

</body>
</html>
